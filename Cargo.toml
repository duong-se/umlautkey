[package]
name = "umlautkey"
description = "The lightweight, open-source utility for typing German Umlauts (ä, ö, ü, ß) effortlessly on standard US/International keyboards."
version = "0.1.0"
edition = "2024"

[dependencies]
enigo = "0.6.1"
lazy_static = "1.5.0"
libc = "0.2.183"
objc2-core-foundation = "0.3.2"
objc2-core-graphics = { version = "0.3.2", features = ["CGEvent", "CGEventTypes", "CGEventSource"] }
rdev = "0.5.3"
